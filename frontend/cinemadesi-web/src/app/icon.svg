<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background — matches --brand-bg -->
  <rect width="32" height="32" rx="7" fill="#080808"/>
  <!-- Subtle gold ring so it pops on light browser chrome (tabs, bookmarks) -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#E8B84B" stroke-opacity="0.3" stroke-width="1"/>
  <!-- The "D" from "CinemaDesi" — bold serif, gold, offset for optical centering -->
  <text
    x="16" y="24"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="24"
    font-weight="900"
    text-anchor="middle"
    fill="#E8B84B"
    style="letter-spacing:-1px"
  >D</text>
</svg>
