spring:
  application:
    name: cinemadesi-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cinemadesi}
    username: ${DB_USERNAME:shivshankar}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5      # keep low for free-tier DB

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns schema, Hibernate only validates
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  threads:
    virtual:
      enabled: true             # Java 21 virtual threads

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:ritikabc124@gmail.com}
    password: ${MAIL_PASSWORD:pdusnpjmtvcnanac}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET:Q70lTdayN+Pefo2gek4cKbNuL679iLbXx3lrLKW0fdk=}
    expiry-ms: 86400000         # 24h
  tmdb:
    api-key: ${TMDB_API_KEY:946551474215b41be9c8b9a04722d0df}
    base-url: https://api.themoviedb.org/3
    trending-refresh-cron: ${TMDB_TRENDING_CRON:0 0 4 * * *}  # 04:00 IST daily
  google:
    # Same client ID configured in NextAuth — used for audience check.
    # Leave empty in local dev to skip the check (logs a warning).
    client-id: ${GOOGLE_CLIENT_ID:465538910890-9ob2rj7i4jgv8kugnv1dqnnbi0j9mvho.apps.googleusercontent.com}
  frontend:
    # Used to build the password-reset URL we email (or log) to users.
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  email:
    # "From" header on outgoing mail. Should match MAIL_USERNAME for Gmail
    # (Gmail rewrites the From header to the authenticated account anyway).
    from-address: ${MAIL_FROM:${MAIL_USERNAME:ritikabc124@gmail.com}}
    from-name:    ${MAIL_FROM_NAME:CinemaDesi}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
